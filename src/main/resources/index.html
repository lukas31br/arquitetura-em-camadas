<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Store - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen">

<nav class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center space-x-3">
        <i class="fa-solid fa-database text-indigo-500 text-2xl"></i>
        <span class="text-xl font-bold tracking-wider text-white">FEATURE STORE</span>
    </div>
    <div class="text-sm bg-gray-900 px-3 py-1.5 rounded-full border border-gray-700 flex items-center space-x-2">
        <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-gray-400 font-medium">Backend Localhost:8080 Conectado</span>
    </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl h-fit">
        <div class="flex items-center space-x-2 mb-6">
            <i class="fa-solid fa-user-plus text-indigo-400 text-lg"></i>
            <h2 class="text-lg font-bold text-white">Cadastrar Novo Usuário</h2>
        </div>

        <form id="userForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Nome Completo</label>
                <input type="text" id="userName" required placeholder="Ex: João Guilherme"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none border-indigo-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
                <input type="email" id="userEmail" required placeholder="Ex: joao@email.com"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none border-indigo-500 transition-colors">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Senha do Sistema</label>
                <input type="password" id="userPassword" required placeholder="••••••••"
                       class="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none border-indigo-500 transition-colors">
            </div>
            <button type="submit"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2.5 px-4 rounded-lg transition-colors flex items-center justify-center space-x-2 mt-2">
                <i class="fa-solid fa-save"></i>
                <span>Salvar no PostgreSQL</span>
            </button>
        </form>
        <div id="formFeedback" class="hidden mt-4 text-xs p-3 rounded-lg text-center font-medium"></div>
    </div>

    <div class="lg:col-span-2 space-y-8">

        <div class="bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
            <div class="px-6 py-4 bg-gray-800/50 border-b border-gray-700 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <i class="fa-solid fa-users text-indigo-400"></i>
                    <h3 class="font-bold text-white">Usuários no Schema (feature_store)</h3>
                </div>
                <button onclick="carregarUsuarios()" class="text-xs bg-gray-700 hover:bg-gray-600 text-gray-200 px-3 py-1.5 rounded transition-colors">
                    <i class="fa-solid fa-rotate-right mr-1"></i> Atualizar
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                    <tr class="bg-gray-900/50 text-gray-400 font-semibold border-b border-gray-700 text-xs uppercase tracking-wider">
                        <th class="px-6 py-3">ID (id_users)</th>
                        <th class="px-6 py-3">Nome</th>
                        <th class="px-6 py-3">E-mail</th>
                    </tr>
                    </thead>
                    <tbody id="usuariosTable" class="divide-y divide-gray-700/60">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl">
                <h4 class="font-bold text-white mb-3 flex items-center space-x-2">
                    <i class="fa-solid fa-folder-open text-amber-400 text-sm"></i>
                    <span>Últimos Datasets</span>
                </h4>
                <ul id="datasetsList" class="space-y-2 text-xs text-gray-400 max-h-40 overflow-y-auto divide-y divide-gray-700/40">
                </ul>
            </div>

            <div class="bg-gray-800 p-5 rounded-xl border border-gray-700 shadow-xl">
                <h4 class="font-bold text-white mb-3 flex items-center space-x-2">
                    <i class="fa-solid fa-code-branch text-emerald-400 text-sm"></i>
                    <span>Histórico de Versões</span>
                </h4>
                <ul id="versionsList" class="space-y-2 text-xs text-gray-400 max-h-40 overflow-y-auto divide-y divide-gray-700/40">
                </ul>
            </div>
        </div>

    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080/api';

    // 1. CARREGAR LISTA DE USUÁRIOS (GET)
    async function carregarUsuarios() {
        try {
            const resposta = await fetch(`${API_BASE_URL}/users`);
            const usuarios = await resposta.json();

            const tbody = document.getElementById('usuariosTable');
            tbody.innerHTML = '';

            if (usuarios.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="px-6 py-8 text-center text-gray-500 italic">Nenhum usuário cadastrado no banco ainda.</td></tr>`;
                return;
            }

            usuarios.forEach(user => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-700/30 transition-colors";
                tr.innerHTML = `
                        <td class="px-6 py-3.5 font-mono text-indigo-400 font-semibold">${user.id_users || 'N/A'}</td>
                        <td class="px-6 py-3.5 text-white font-medium">${user.name}</td>
                        <td class="px-6 py-3.5 text-gray-300">${user.email}</td>
                    `;
                tbody.appendChild(tr);
            });
        } catch (erro) {
            console.error("Erro ao buscar usuários:", erro);
        }
    }

    // 2. ENVIAR FORMULÁRIO DE CADASTRO (POST)
    document.getElementById('userForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const feedbackBox = document.getElementById('formFeedback');
        const name = document.getElementById('userName').value;
        const email = document.getElementById('userEmail').value;
        const password = document.getElementById('userPassword').value;

        feedbackBox.className = "mt-4 text-xs p-3 rounded-lg text-center font-medium bg-indigo-900/50 text-indigo-300 block";
        feedbackBox.textContent = "Processando transação JDBC...";

        try {
            const resposta = await fetch(`${API_BASE_URL}/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });

            if (resposta.ok) {
                feedbackBox.className = "mt-4 text-xs p-3 rounded-lg text-center font-medium bg-emerald-900/50 text-emerald-300 block";
                feedbackBox.innerHTML = '<i class="fa-solid fa-circle-check mr-1"></i> Cadastrado com sucesso no PostgreSQL!';
                document.getElementById('userForm').reset();
                carregarUsuarios();
            } else {
                throw new Error("Erro na resposta do servidor");
            }
        } catch (erro) {
            feedbackBox.className = "mt-4 text-xs p-3 rounded-lg text-center font-medium bg-red-900/50 text-red-300 block";
            feedbackBox.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i> Falha ao salvar usuário.';
        }
    });

    carregarUsuarios();
</script>
</body>
</html>
